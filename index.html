<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="技工管理">
<title>技工物 納品管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F4F0; --surface: #FFFFFF; --surface2: #F0EFE9;
  --border: #E2E0D8; --border2: #CCCAC0;
  --text: #1A1917; --text2: #6B6860; --text3: #9C9A93;
  --accent: #2D5016; --accent-bg: #EBF2E4; --accent-text: #2D5016;
  --danger: #8B1A1A; --danger-bg: #FBE9E9; --danger-text: #8B1A1A;
  --warn: #7A4F00; --warn-bg: #FEF3DC; --warn-text: #7A4F00;
  --info: #1A3A6B; --info-bg: #E8EEF8; --info-text: #1A3A6B;
  --radius: 10px; --radius-lg: 16px;
  --font: 'Noto Sans JP', sans-serif; --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }
.app { display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; padding-top: max(12px, env(safe-area-inset-top)); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar-left h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.topbar-left .date-label { font-size: 12px; color: var(--text3); margin-top: 1px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.btn-add { background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 9px 16px; font-size: 14px; font-weight: 500; font-family: var(--font); cursor: pointer; }
.btn-add:active { opacity: 0.75; }
.btn-settings { background: transparent; border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; font-size: 13px; font-family: var(--font); color: var(--text2); cursor: pointer; }
.main { flex: 1; padding: 16px; max-width: 1000px; margin: 0 auto; width: 100%; }
.alerts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; display: flex; align-items: flex-start; gap: 10px; }
.alert-icon { font-size: 15px; flex-shrink: 0; }
.alert-danger { background: var(--danger-bg); color: var(--danger-text); }
.alert-warn { background: var(--warn-bg); color: var(--warn-text); }
.alert-info { background: var(--info-bg); color: var(--info-text); }
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 16px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.stat-val { font-size: 26px; font-weight: 600; font-family: var(--mono); }
.stat-val.danger { color: var(--danger); }
.stat-val.warn { color: var(--warn); }
.controls { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 12px; }
.tabs { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 12px 18px; font-size: 13px; font-family: var(--font); color: var(--text2); border: none; background: transparent; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.badge-count { display: inline-block; background: var(--danger-bg); color: var(--danger-text); border-radius: 20px; font-size: 10px; padding: 1px 6px; margin-left: 5px; }
.toolbar { display: flex; gap: 8px; padding: 12px 14px; flex-wrap: wrap; }
.toolbar input, .toolbar select { border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; font-size: 13px; background: var(--bg); color: var(--text); font-family: var(--font); outline: none; }
.toolbar input { flex: 1; min-width: 150px; }
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; min-width: 780px; }
th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 500; color: var(--text3); background: var(--surface2); border-bottom: 1px solid var(--border); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.3px; }
td { padding: 11px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; font-size: 13px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }
.pat-name { font-weight: 500; }
.pat-no { font-family: var(--mono); font-size: 12px; color: var(--text2); }
.teeth-val { font-family: var(--mono); font-size: 12px; color: var(--text2); }
.badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.badge-pending { background: var(--surface2); color: var(--text2); }
.badge-done { background: var(--accent-bg); color: var(--accent-text); }
.badge-overdue { background: var(--danger-bg); color: var(--danger-text); }
.badge-today { background: var(--warn-bg); color: var(--warn-text); }
.badge-soon { background: var(--info-bg); color: var(--info-text); }
.chk { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; color: var(--text3); transition: all 0.15s; }
.chk.done { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-row { background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 12px; cursor: pointer; color: var(--text2); font-family: var(--font); }
.empty { text-align: center; padding: 3rem 1rem; color: var(--text3); }
.empty-icon { font-size: 36px; margin-bottom: 12px; }
.loading { text-align: center; padding: 3rem; color: var(--text3); }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
@media (min-width: 640px) {
  .modal-overlay { align-items: center; padding: 20px; }
  .modal { border-radius: var(--radius-lg) !important; max-height: 90vh !important; }
}
.modal { background: var(--surface); border-radius: var(--radius-lg) var(--radius-lg) 0 0; width: 100%; max-width: 580px; max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: env(safe-area-inset-bottom); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 1; }
.modal-header h2 { font-size: 16px; font-weight: 600; }
.btn-close { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--surface2); font-size: 18px; cursor: pointer; color: var(--text2); display: flex; align-items: center; justify-content: center; }
.modal-body { padding: 18px 20px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1/-1; }
.form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
.form-group input, .form-group select, .form-group textarea { border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-size: 14px; background: var(--bg); color: var(--text); font-family: var(--font); outline: none; width: 100%; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); background: var(--surface); }
.form-group input[readonly] { background: var(--surface2); color: var(--text2); cursor: default; }
.form-group textarea { resize: vertical; min-height: 70px; }
.modal-footer { display: flex; gap: 10px; padding: 14px 20px 18px; border-top: 1px solid var(--border); background: var(--surface); }
.btn-cancel { flex: 1; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-size: 14px; font-family: var(--font); background: transparent; color: var(--text2); cursor: pointer; }
.btn-save { flex: 2; border: none; border-radius: var(--radius); padding: 12px; font-size: 14px; font-weight: 500; font-family: var(--font); background: var(--accent); color: #fff; cursor: pointer; }
.btn-save:active { opacity: 0.8; }
.btn-delete { border: 1px solid var(--danger-bg); background: var(--danger-bg); color: var(--danger-text); border-radius: var(--radius); padding: 12px 14px; font-size: 13px; font-family: var(--font); cursor: pointer; }

/* Palmer chart — karte style */
.palmer-wrap { border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface); overflow: hidden; font-family: var(--mono); user-select: none; }
.palmer-jaw-row { display: grid; grid-template-columns: repeat(8,1fr) 3px repeat(8,1fr); }
.palmer-jaw-row.upper .tooth { border-bottom: 1px solid var(--border); }
.palmer-jaw-row.lower .tooth { border-top: 1px solid var(--border); }
.palmer-center-v { background: var(--border2); }
.palmer-h-line { height: 3px; background: var(--border2); }
.palmer-labels { display: grid; grid-template-columns: repeat(8,1fr) 3px repeat(8,1fr); background: var(--surface2); }
.palmer-labels.top { border-bottom: 1px solid var(--border); }
.palmer-labels.bottom { border-top: 1px solid var(--border); }
.palmer-labels span { text-align: center; font-size: 10px; color: var(--text3); padding: 3px 0; }
.palmer-labels .spacer { background: var(--border2); }
.palmer-side-label { display: grid; grid-template-columns: 1fr 3px 1fr; background: var(--surface2); }
.palmer-side-label span { text-align: center; font-size: 11px; color: var(--text3); padding: 3px 6px; }
.palmer-side-label .right { text-align: right; }
.palmer-side-label .left { text-align: left; }
.palmer-side-label .div { background: var(--border2); }
.tooth { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-family: var(--mono); font-weight: 500; color: var(--text3); cursor: pointer; transition: all 0.1s; border-right: 1px solid var(--border); }
.tooth:last-child { border-right: none; }
.tooth.sel { background: var(--accent); color: #fff; font-weight: 700; }
.tooth:active { opacity: 0.6; }
.teeth-selected { font-size: 13px; color: var(--text2); margin-top: 8px; font-family: var(--mono); min-height: 20px; letter-spacing: 1px; }

/* Settings */
.settings-section { margin-bottom: 24px; }
.settings-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.settings-list { display: flex; flex-direction: column; gap: 6px; }
.settings-item { display: flex; align-items: center; gap: 8px; }
.settings-item input { flex: 1; border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; font-size: 14px; background: var(--bg); color: var(--text); font-family: var(--font); outline: none; }
.settings-item input:focus { border-color: var(--accent); }
.btn-icon { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: transparent; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); flex-shrink: 0; }
.btn-icon.del { border-color: var(--danger-bg); background: var(--danger-bg); color: var(--danger-text); }
.btn-add-item { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border: 1px dashed var(--border2); border-radius: var(--radius); background: transparent; font-size: 13px; color: var(--text3); cursor: pointer; font-family: var(--font); width: 100%; margin-top: 4px; }
.btn-add-item:hover { border-color: var(--accent); color: var(--accent); }
.type-check-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2px; }
.type-chip { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 13px; color: var(--text2); background: var(--bg); transition: all 0.12s; user-select: none; }
.type-chip.sel { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-text); font-weight: 500; }
.type-chip:active { opacity: 0.7; }
tr.row-upcoming td { background: #FFFBEB !important; }
tr.row-overdue td { background: #FEF2F2 !important; }
tr.row-upcoming:hover td { background: #FEF3C7 !important; }
tr.row-overdue:hover td { background: #FEE2E2 !important; }
.sync-dot.syncing { background: var(--warn); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.sync-label { font-size: 12px; color: var(--text3); display: flex; align-items: center; }
@media (max-width: 500px) {
  .stats { grid-template-columns: repeat(2,1fr); }
  .main { padding: 12px; }
  .topbar { padding: 10px 14px; padding-top: max(10px, env(safe-area-inset-top)); }
  .tooth { height: 32px; font-size: 11px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="date-label" id="date-label"></div>
      <h1>技工物 納品管理</h1>
    </div>
    <div class="topbar-right">
      <span class="sync-label"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">同期済み</span></span>
      <button class="btn-settings" onclick="openSettings()">⚙ 設定</button>
      <button class="btn-add" onclick="openAdd()">＋ 登録</button>
    </div>
  </div>

  <div class="main">
    <div class="alerts" id="alerts"></div>
    <div class="stats">
      <div class="stat"><div class="stat-label">全件数</div><div class="stat-val" id="s-all">—</div></div>
      <div class="stat"><div class="stat-label">未納品</div><div class="stat-val" id="s-pending">—</div></div>
      <div class="stat"><div class="stat-label">前日／当日未納品</div><div class="stat-val warn" id="s-today">—</div></div>
      <div class="stat"><div class="stat-label">遅延</div><div class="stat-val danger" id="s-overdue">—</div></div>
    </div>
    <div class="controls">
      <div class="tabs">
        <button class="tab active" onclick="setTab('all',this)">すべて</button>
        <button class="tab" onclick="setTab('pending',this)">未納品</button>
        <button class="tab" onclick="setTab('upcoming',this)">前日／当日未納品</button>
        <button class="tab" onclick="setTab('overdue',this)">遅延 <span class="badge-count" id="overdue-count" style="display:none"></span></button>
        <button class="tab" onclick="setTab('done',this)">納品済み</button>
      </div>
      <div class="toolbar">
        <input type="text" id="search" placeholder="患者名・番号で検索..." oninput="render()">
        <select id="flab" onchange="render()"><option value="">すべての技工所</option></select>
        <select id="ftype" onchange="render()"><option value="">すべての種類</option></select>
      </div>
    </div>
    <div class="table-wrap">
      <div id="loading" class="loading"><div class="spinner"></div>読み込み中...</div>
      <div class="table-scroll" id="table-area" style="display:none">
        <table>
          <thead><tr>
            <th>日付</th><th>患者番号</th><th>患者名</th><th>歯式</th>
            <th>技工物</th><th>技工所</th><th>予約日</th><th>納品予定</th>
            <th>状態</th><th>納品確認</th><th></th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
        <div id="empty" class="empty" style="display:none"><div class="empty-icon">📋</div><p>該当するデータがありません</p></div>
      </div>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header"><h2>新規登録</h2><button class="btn-close" onclick="closeAdd()">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>日付</label><input type="date" id="f-date"></div>
        <div class="form-group"><label>患者番号</label><input type="text" id="f-patno" placeholder="例: 00123"></div>
        <div class="form-group full"><label>患者名</label><input type="text" id="f-name" placeholder="フリガナまたは漢字"></div>
        <div class="form-group"><label>技工所</label><select id="f-lab"></select></div>
        <div class="form-group full"><label>補綴物種類（複数選択可）</label><div id="f-type-list" class="type-check-list"></div></div>
        <div class="form-group"><label>予約日</label><input type="date" id="f-appt"></div>
        <div class="form-group"><label>納品予定日</label><input type="date" id="f-eta"></div>
        <div class="form-group full"><label>指示・備考（任意）</label><textarea id="f-note" placeholder="例: 前装冠、単色など"></textarea></div>
        <div class="form-group full">
          <label>歯式（Palmer表記）</label>
          <div id="palmer-add" style="margin-top:4px"></div>
          <div class="teeth-selected">選択中: <span id="teeth-sel-add">なし</span></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeAdd()">キャンセル</button>
      <button class="btn-save" onclick="saveNew()">登録する</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header"><h2>詳細・編集</h2><button class="btn-close" onclick="closeEdit()">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>日付</label><input type="date" id="e-date"></div>
        <div class="form-group"><label>患者番号</label><input type="text" id="e-patno"></div>
        <div class="form-group full"><label>患者名</label><input type="text" id="e-name"></div>
        <div class="form-group"><label>技工所</label><select id="e-lab"></select></div>
        <div class="form-group full"><label>補綴物種類（複数選択可）</label><div id="e-type-list" class="type-check-list"></div></div>
        <div class="form-group"><label>予約日</label><input type="date" id="e-appt"></div>
        <div class="form-group"><label>納品予定日</label><input type="date" id="e-eta"></div>
        <div class="form-group"><label>実際の納品日</label><input type="date" id="e-delivered"></div>
        <div class="form-group"><label>歯式</label><input type="text" id="e-teeth" readonly></div>
        <div class="form-group full"><label>指示・備考</label><textarea id="e-note"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-delete" onclick="deleteRec()">削除</button>
      <button class="btn-cancel" onclick="closeEdit()">キャンセル</button>
      <button class="btn-save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-header"><h2>⚙ 設定</h2><button class="btn-close" onclick="closeSettings()">×</button></div>
    <div class="modal-body">
      <div class="settings-section">
        <h3>技工所</h3>
        <div class="settings-list" id="lab-list"></div>
        <button class="btn-add-item" onclick="addLabItem()">＋ 技工所を追加</button>
      </div>
      <div class="settings-section">
        <h3>補綴物種類</h3>
        <div class="settings-list" id="type-list"></div>
        <button class="btn-add-item" onclick="addTypeItem()">＋ 種類を追加</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeSettings()">キャンセル</button>
      <button class="btn-save" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://hqiieomajoqbihflvlmj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxaWllb21ham9xYmloZmx2bG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyOTQxOTAsImV4cCI6MjA5MTg3MDE5MH0.rOmxvuh-zM4afFOwJYWTpv2mBCPQiCDcjEJs6sAg0hI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const SETTINGS_KEY = 'dental_settings_v1';
let labs = ['和田精密','PMラボ','YUWA','愛歯'];
let types = ['Br（ブリッジ）','Cr（クラウン）','FD（総義歯）','PD（部分義歯）','Tec（テック）','Inlay','ジルコニア','セラミック','その他'];

function loadSettings() {
  try { const s=localStorage.getItem(SETTINGS_KEY); if(s){const p=JSON.parse(s);labs=p.labs||labs;types=p.types||types;} } catch(e){}
}
function saveSettingsLocal() {
  try { localStorage.setItem(SETTINGS_KEY,JSON.stringify({labs,types})); } catch(e){}
}

let records=[], currentTab='all', editId=null, selTeeth=[];

// Palmer notation helpers
// Quadrants: UR=upper-right, UL=upper-left, LR=lower-right, LL=lower-left
const SYM = {UR:'┘', UL:'└', LR:'┐', LL:'┌'};
const Q_ORDER = {UR:0,UL:1,LR:2,LL:3};

function buildPalmerChart(containerId) {
  const c = document.getElementById(containerId);
  const makeTooth = (q, n) => {
    const key = q+n;
    const sel = selTeeth.includes(key) ? ' sel' : '';
    return `<div class="tooth${sel}" data-key="${key}" onclick="toggleTooth('${key}','${containerId}')">${n}</div>`;
  };
  // UR: 8→1 (right side, upper), UL: 1→8 (left side, upper)
  // LR: 8→1 (right side, lower), LL: 1→8 (left side, lower)
  const urRow = [8,7,6,5,4,3,2,1].map(n=>makeTooth('UR',n)).join('');
  const ulRow = [1,2,3,4,5,6,7,8].map(n=>makeTooth('UL',n)).join('');
  const lrRow = [8,7,6,5,4,3,2,1].map(n=>makeTooth('LR',n)).join('');
  const llRow = [1,2,3,4,5,6,7,8].map(n=>makeTooth('LL',n)).join('');
  const numRow = [8,7,6,5,4,3,2,1].map(n=>`<span>${n}</span>`).join('')
               + '<span class="spacer"></span>'
               + [1,2,3,4,5,6,7,8].map(n=>`<span>${n}</span>`).join('');

  c.innerHTML = `
    <div class="palmer-wrap">
      <div class="palmer-side-label">
        <span class="right">右側</span><span class="div"></span><span class="left">左側</span>
      </div>
      <div class="palmer-labels top">${numRow}</div>
      <div class="palmer-jaw-row upper">${urRow}<div class="palmer-center-v"></div>${ulRow}</div>
      <div class="palmer-h-line"></div>
      <div class="palmer-jaw-row lower">${lrRow}<div class="palmer-center-v"></div>${llRow}</div>
      <div class="palmer-labels bottom">${numRow}</div>
    </div>`;
}

function toggleTooth(key, containerId) {
  if(selTeeth.includes(key)) selTeeth.splice(selTeeth.indexOf(key),1);
  else selTeeth.push(key);
  // Update only the clicked tooth visually
  const el = document.querySelector(`[data-key="${key}"]`);
  if(el) el.classList.toggle('sel', selTeeth.includes(key));
  updateTeethDisplay();
}

function sortTeeth(arr) {
  return [...arr].sort((a,b) => {
    const qa=a.slice(0,2), qb=b.slice(0,2), na=parseInt(a.slice(2)), nb=parseInt(b.slice(2));
    if(Q_ORDER[qa]!==Q_ORDER[qb]) return Q_ORDER[qa]-Q_ORDER[qb];
    return na-nb;
  });
}

function teethToStr(arr) {
  // ① 右側(UR/LR)は数字→記号、左側(UL/LL)は記号→数字
  return sortTeeth(arr).map(k => {
    const q=k.slice(0,2), n=k.slice(2);
    return (q==='UR'||q==='LR') ? n+SYM[q] : SYM[q]+n;
  }).join('  ');
}

function updateTeethDisplay() {
  const el = document.getElementById('teeth-sel-add');
  if(el) el.textContent = selTeeth.length ? teethToStr(selTeeth) : 'なし';
}

function today() { return new Date().toISOString().slice(0,10); }
function fmt(d) { if(!d) return'—'; const p=d.split('-'); return p[1]+'/'+p[2]; }
function daysDiff(a,b) { return Math.round((new Date(a)-new Date(b))/86400000); }
function getStatus(r) {
  const t=today();
  if(r.delivered) return 'done';
  // ② 遅延: 予約日が過去で未納品、またはeta超過
  if(!r.delivered && r.appt && r.appt < t) return 'overdue';
  if(!r.delivered && r.eta && r.eta < t) return 'overdue';
  // ③ 前日／当日未納品: 予約日が今日または明日
  if(!r.delivered && r.appt && (r.appt === t || daysDiff(r.appt, t) === 1)) return 'upcoming';
  return 'pending';
}
function setSyncState(s) {
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  txt.textContent=s==='syncing'?'同期中...':s==='error'?'エラー':'同期済み';
}
function populateSelects() {
  ['f-lab','e-lab'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=labs.map(l=>`<option>${l}</option>`).join('');});
}
function buildTypeChips(containerId, selectedArr) {
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = types.map(t => {
    const sel = selectedArr.includes(t) ? ' sel' : '';
    return `<div class="type-chip${sel}" onclick="toggleTypeChip('${containerId}','${t}',this)">${t}</div>`;
  }).join('');
}
function toggleTypeChip(containerId, t, el) {
  el.classList.toggle('sel');
}
function getSelectedTypes(containerId) {
  return Array.from(document.querySelectorAll(`#${containerId} .type-chip.sel`)).map(el=>el.textContent);
}
async function load() {
  setSyncState('syncing');
  const {data,error}=await sb.from('records').select('*').order('created_at',{ascending:false});
  if(error){setSyncState('error');return;}
  records=data||[];
  setSyncState('ok');
  initFilters(); render();
  document.getElementById('loading').style.display='none';
  document.getElementById('table-area').style.display='block';
}
function initFilters() {
  const fl=document.getElementById('flab'),ft=document.getElementById('ftype');
  const lv=fl.value,tv=ft.value;
  fl.innerHTML='<option value="">すべての技工所</option>'+labs.map(l=>`<option>${l}</option>`).join('');
  ft.innerHTML='<option value="">すべての種類</option>'+types.map(t=>`<option>${t}</option>`).join('');
  fl.value=lv;ft.value=tv;
}
function render() {
  const t=today();
  document.getElementById('date-label').textContent=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  const q=document.getElementById('search').value.toLowerCase();
  const flab=document.getElementById('flab').value, ftype=document.getElementById('ftype').value;
  const overdue=records.filter(r=>getStatus(r)==='overdue');
  const upcomingRecs=records.filter(r=>getStatus(r)==='upcoming');
  document.getElementById('s-all').textContent=records.length;
  document.getElementById('s-pending').textContent=records.filter(r=>!r.delivered).length;
  document.getElementById('s-today').textContent=upcomingRecs.length;
  document.getElementById('s-overdue').textContent=overdue.length;
  const oc=document.getElementById('overdue-count');
  if(overdue.length){oc.style.display='';oc.textContent=overdue.length;}else{oc.style.display='none';}
  let html='';
  if(overdue.length) html+=`<div class="alert alert-danger"><span class="alert-icon">⚠️</span>未納品・遅延: ${overdue.map(r=>r.name+'（'+r.lab+'）').join('、')}</div>`;
  if(upcomingRecs.length) html+=`<div class="alert alert-warn"><span class="alert-icon">📅</span>前日／当日未納品: ${upcomingRecs.map(r=>r.name+'（予約'+fmt(r.appt)+'）').join('、')}</div>`;
  document.getElementById('alerts').innerHTML=html;
  let filtered=records.filter(r=>{
    const st=getStatus(r);
    if(currentTab==='pending'&&r.delivered) return false;
    if(currentTab==='upcoming'&&st!=='upcoming') return false;
    if(currentTab==='overdue'&&st!=='overdue') return false;
    if(currentTab==='done'&&!r.delivered) return false;
    if(q&&!r.name?.toLowerCase().includes(q)&&!r.patno?.includes(q)) return false;
    if(flab&&r.lab!==flab) return false;
    if(ftype&&!r.type?.includes(ftype)) return false;
    return true;
  });
  filtered.sort((a,b)=>(a.appt||'')>(b.appt||'')?1:-1);
  const tbody=document.getElementById('tbody'),empty=document.getElementById('empty');
  if(!filtered.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  // ⑤ row color classes
  const statusMap={done:['badge-done','納品済み'],overdue:['badge-overdue','遅延'],upcoming:['badge-today','前日／当日'],pending:['badge-pending','待ち']};
  tbody.innerHTML=filtered.map(r=>{
    const st=getStatus(r),[bc,bl]=statusMap[st]||['badge-pending','待ち'];
    const rowClass = st==='overdue' ? ' class="row-overdue"' : st==='upcoming' ? ' class="row-upcoming"' : '';
    return `<tr${rowClass}>
      <td>${fmt(r.date)}</td><td><span class="pat-no">${r.patno||'—'}</span></td>
      <td><span class="pat-name">${r.name||'—'}</span></td>
      <td><span class="teeth-val">${r.teeth||'—'}</span></td>
      <td>${r.type||'—'}</td><td>${r.lab||'—'}</td>
      <td>${fmt(r.appt)}</td><td>${fmt(r.eta)}</td>
      <td><span class="badge ${bc}">${bl}</span></td>
      <td><button class="${r.delivered?'chk done':'chk'}" onclick="toggleDelivered('${r.id}')">${r.delivered?'✓':''}</button></td>
      <td><button class="btn-row" onclick="openEdit('${r.id}')">詳細</button></td>
    </tr>`;
  }).join('');
}
function setTab(tab,el){currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}

function openAdd(){
  selTeeth.length=0;
  populateSelects();
  buildTypeChips('f-type-list',[]);
  document.getElementById('f-date').value=today();
  ['f-patno','f-name','f-note'].forEach(id=>document.getElementById(id).value='');
  ['f-appt','f-eta'].forEach(id=>document.getElementById(id).value='');
  buildPalmerChart('palmer-add');
  document.getElementById('teeth-sel-add').textContent='なし';
  document.getElementById('add-modal').classList.add('open');
}
function closeAdd(){document.getElementById('add-modal').classList.remove('open');}

async function saveNew(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('患者名を入力してください');return;}
  const selectedTypes=getSelectedTypes('f-type-list');
  const rec={
    date:document.getElementById('f-date').value,
    patno:document.getElementById('f-patno').value.trim(),
    name, lab:document.getElementById('f-lab').value,
    type:selectedTypes.join('・'),
    teeth:teethToStr(selTeeth),
    appt:document.getElementById('f-appt').value,
    eta:document.getElementById('f-eta').value,
    note:document.getElementById('f-note').value.trim(),
    delivered:''
  };
  setSyncState('syncing');
  const {error}=await sb.from('records').insert([rec]);
  if(error){setSyncState('error');alert('保存に失敗しました: '+error.message);return;}
  closeAdd(); await load();
}

function openEdit(id){
  editId=id; const r=records.find(x=>x.id===id); if(!r) return;
  populateSelects();
  const savedTypes = r.type ? r.type.split('・') : [];
  buildTypeChips('e-type-list', savedTypes);
  document.getElementById('e-date').value=r.date||'';
  document.getElementById('e-patno').value=r.patno||'';
  document.getElementById('e-name').value=r.name||'';
  document.getElementById('e-lab').value=r.lab||labs[0];
  document.getElementById('e-appt').value=r.appt||'';
  document.getElementById('e-eta').value=r.eta||'';
  document.getElementById('e-delivered').value=r.delivered||'';
  document.getElementById('e-teeth').value=r.teeth||'';
  document.getElementById('e-note').value=r.note||'';
  document.getElementById('edit-modal').classList.add('open');
}
function closeEdit(){document.getElementById('edit-modal').classList.remove('open');}

async function saveEdit(){
  const selectedTypes=getSelectedTypes('e-type-list');
  const upd={
    date:document.getElementById('e-date').value,
    patno:document.getElementById('e-patno').value.trim(),
    name:document.getElementById('e-name').value.trim(),
    lab:document.getElementById('e-lab').value,
    type:selectedTypes.join('・'),
    appt:document.getElementById('e-appt').value,
    eta:document.getElementById('e-eta').value,
    delivered:document.getElementById('e-delivered').value,
    teeth:document.getElementById('e-teeth').value,
    note:document.getElementById('e-note').value.trim()
  };
  setSyncState('syncing');
  const {error}=await sb.from('records').update(upd).eq('id',editId);
  if(error){setSyncState('error');alert('保存に失敗しました');return;}
  closeEdit(); await load();
}
async function deleteRec(){
  if(!confirm('この記録を削除しますか？')) return;
  setSyncState('syncing');
  const {error}=await sb.from('records').delete().eq('id',editId);
  if(error){setSyncState('error');alert('削除に失敗しました');return;}
  closeEdit(); await load();
}
async function toggleDelivered(id){
  const r=records.find(x=>x.id===id); if(!r) return;
  setSyncState('syncing');
  const {error}=await sb.from('records').update({delivered:r.delivered?'':today()}).eq('id',id);
  if(error){setSyncState('error');return;}
  await load();
}

// Settings
function openSettings(){renderLabList();renderTypeList();document.getElementById('settings-modal').classList.add('open');}
function closeSettings(){document.getElementById('settings-modal').classList.remove('open');}
function renderLabList(){
  document.getElementById('lab-list').innerHTML=labs.map((l,i)=>`
    <div class="settings-item">
      <input type="text" value="${l}" id="lab-item-${i}">
      <button class="btn-icon del" onclick="removeLab(${i})">✕</button>
    </div>`).join('');
}
function renderTypeList(){
  document.getElementById('type-list').innerHTML=types.map((t,i)=>`
    <div class="settings-item">
      <input type="text" value="${t}" id="type-item-${i}">
      <button class="btn-icon del" onclick="removeType(${i})">✕</button>
    </div>`).join('');
}
function addLabItem(){labs.push('新しい技工所');renderLabList();}
function addTypeItem(){types.push('新しい種類');renderTypeList();}
function removeLab(i){labs.splice(i,1);renderLabList();}
function removeType(i){types.splice(i,1);renderTypeList();}
function saveSettings(){
  labs=Array.from(document.querySelectorAll('[id^="lab-item-"]')).map(el=>el.value.trim()).filter(Boolean);
  types=Array.from(document.querySelectorAll('[id^="type-item-"]')).map(el=>el.value.trim()).filter(Boolean);
  saveSettingsLocal(); initFilters(); closeSettings();
}

['add-modal','edit-modal','settings-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById(id).classList.remove('open');});
});

loadSettings(); load();
</script>
